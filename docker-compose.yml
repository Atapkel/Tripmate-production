services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_WS_BASE_URL: ""
        VITE_APP_NAME: TripMate
    container_name: tripmate-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  certbot-init:
    image: certbot/certbot
    container_name: tripmate-certbot-init
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      frontend:
        condition: service_healthy
    restart: "no"
    entrypoint: /bin/sh
    command: |
      -c '
      DOMAIN="tripmate.live"
      EMAIL="tripmate.connect@gmail.com"

      if [ -d "/etc/letsencrypt/live/$$DOMAIN" ]; then
        echo "Certificate already exists for $$DOMAIN — skipping."
        exit 0
      fi

      echo "Requesting SSL certificate for $$DOMAIN..."
      certbot certonly --webroot --webroot-path=/var/www/certbot \
        --email "$$EMAIL" --agree-tos --no-eff-email \
        -d "$$DOMAIN" -d "www.$$DOMAIN" &&
      echo "Certificate obtained successfully!" ||
      echo "Failed to obtain certificate. Check DNS and port 80."
      '

  certbot:
    image: certbot/certbot
    container_name: tripmate-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tripmate-backend
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: tripmate-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tripmate_db}
      POSTGRES_USER: ${DB_USER:-tripmate}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tripmate_password}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tripmate} -d ${DB_NAME:-tripmate_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tripmate-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  uploads:
  certbot-conf:
  certbot-www:
