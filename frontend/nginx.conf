# HTTP — redirect to HTTPS + ACME challenge
server {
    listen 80;
    server_name tripmate.live www.tripmate.live localhost;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name tripmate.live www.tripmate.live;

    ssl_certificate     /etc/letsencrypt/live/tripmate.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tripmate.live/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # API proxy
    location /api/ {
        proxy_pass http://tripmate-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Health check proxy
    location /health {
        proxy_pass http://tripmate-backend:8000;
        proxy_set_header Host $host;
    }

    # Uploaded files proxy
    location ^~ /uploads/ {
        proxy_pass http://tripmate-backend:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback — serve index.html for all frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
