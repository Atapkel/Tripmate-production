# Temporary HTTP-only config for initial SSL certificate setup.
# After obtaining the cert, the main nginx.conf (with HTTPS) takes over.
server {
    listen 80;
    server_name tripmate.live www.tripmate.live;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 200 'Setting up SSL...';
        add_header Content-Type text/plain;
    }
}
